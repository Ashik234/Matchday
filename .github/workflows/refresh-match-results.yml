name: Refresh Match Results

# WC2026 matches finish across the day; scrape once at end-of-day UTC to pick
# up final scores + goalscorers from BBC Sport. Self-gates outside the
# tournament window — runs become near-instant no-ops between Jul 19 and Jun 11.
on:
  schedule:
    - cron: '30 23 * * *'    # Every day 23:30 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-match-results
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for Puppeteer
        run: pnpm exec puppeteer browsers install chrome

      - name: Run match-results scraper
        run: pnpm run scrape:results -- --lookback 2

      - name: Detect content changes (ignore scrapedAt-only)
        id: diff
        run: |
          if git diff --quiet -- public/data/match-results.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "[refresh] no diff at all"
            exit 0
          fi
          CHANGED_LINES=$(git diff --unified=0 -- public/data/match-results.json \
            | grep -E '^[+-][^+-]' | grep -vE '"(scrapedAt|finishedAt)":' || true)
          if [ -z "$CHANGED_LINES" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "[refresh] only timestamps changed — skip commit"
            git checkout -- public/data/match-results.json
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "[refresh] match results changed:"
            echo "$CHANGED_LINES" | head -30
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "Ashik234"
          git config user.email "121389068+Ashik234@users.noreply.github.com"
          git add public/data/match-results.json
          git commit -m "data: refresh match results ($(date -u +%Y-%m-%d))"
          git push
