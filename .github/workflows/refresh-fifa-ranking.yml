name: Refresh FIFA Ranking

# Matches happen daily during the tournament window; FIFA refreshes the ranking
# after each FIFA-window match. Run daily so the site always has fresh points.
# Manual trigger also available via the Actions tab.
on:
  schedule:
    - cron: '17 6 * * *'   # Every day 06:17 UTC
  workflow_dispatch:

# Allow the workflow to push back to the repo.
permissions:
  contents: write

concurrency:
  group: refresh-fifa-ranking
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a token that can push so the commit lands.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for Puppeteer
        run: pnpm exec puppeteer browsers install chrome

      - name: Run ranking scraper
        run: pnpm run scrape:ranking

      - name: Detect content changes (ignore scrapedAt-only)
        id: diff
        run: |
          if git diff --quiet -- public/data/fifa-ranking.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "[refresh] no diff at all"
            exit 0
          fi
          # If the only changed field is scrapedAt, treat as no-op.
          CHANGED_LINES=$(git diff --unified=0 -- public/data/fifa-ranking.json \
            | grep -E '^[+-][^+-]' | grep -vE '"scrapedAt":' || true)
          if [ -z "$CHANGED_LINES" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "[refresh] only scrapedAt changed — skip commit"
            git checkout -- public/data/fifa-ranking.json
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "[refresh] ranking data changed:"
            echo "$CHANGED_LINES" | head -30
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          # Use the github-actions[bot] identity GitHub recognizes — Vercel and
          # other deploy hooks match this to a real GitHub account, so deploys
          # are not blocked by "unmatched commit email".
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/fifa-ranking.json
          git commit -m "data: refresh FIFA world ranking ($(date -u +%Y-%m-%d))"
          git push
